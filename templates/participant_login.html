{% extends "base.html" %}
{% block title %}تسجيل الدخول لحسابك{% endblock %}
{% block content %}
<div class="card">
  <div class="eyebrow">تسجيل الدخول</div>
  <h1>ادخل لحسابك</h1>
  <p class="lead">استخدم معرف تيليجرام وكلمة المرور اللي سجّلت فيهم عشان تشوف رابطك وعدد انضماماتك.</p>
  <form method="POST">
    <label for="username">معرفك على تيليجرام</label>
    <input type="text" id="username" name="username" placeholder="username" required autofocus>
    <label for="password">كلمة المرور</label>
    <input type="password" id="password" name="password" required>
    <button type="submit">دخول</button>
  </form>
  <div class="foot-note">ما عندك حساب بعد؟ <a class="link-plain" href="{{ url_for('home') }}">أنشئ حساباً من هنا</a></div>
</div>
{% endblock %}
